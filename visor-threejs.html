<!DOCTYPE html>
<html lang=es>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Visor Three.js — Mesas 🃏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#111;font-family:'Segoe UI',Arial,sans-serif}

/* ── UI Panel ── */
#ui{position:absolute;top:16px;left:16px;color:#fff;background:rgba(10,10,15,0.85);padding:14px 16px;border-radius:12px;font-size:13px;min-width:210px;z-index:10;pointer-events:none;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.06)}
#ui *{pointer-events:all}
#ui h2{font-size:13px;margin:0 0 6px;color:#c8b898;letter-spacing:0.5px;font-weight:600}

/* ── Secciones ── */
.section{font-size:10px;color:#6a6458;margin:10px 0 4px 4px;text-transform:uppercase;letter-spacing:1px}

/* ── Botón mesa ── */
.mesa-btn{display:block;width:100%;text-align:left;background:transparent;border:none;color:#8a8478;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.15s;font-family:inherit}
.mesa-btn:hover{background:rgba(255,255,255,0.04);color:#c8b898}
.mesa-btn.active{background:rgba(200,184,152,0.1);color:#d4c5a9;border-left:2px solid #c8b898}
.mesa-btn .size{float:right;font-size:10px;color:#5a5448;margin-top:1px}

/* ── Toggle switches ── */
.toggle-row{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:#8a8478;transition:all 0.15s}
.toggle-row:hover{background:rgba(255,255,255,0.04);color:#c8b898}
.toggle-row.active{color:#d4c5a9}
.toggle-switch{width:28px;height:14px;background:#3a3428;border-radius:7px;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle-switch.on{background:#6a8a5a}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#8a8478;transition:all 0.2s}
.toggle-switch.on::after{left:16px;background:#c8b898}

/* ── Card mode selector ── */
.mode-select{display:flex;gap:4px;margin:6px 0 0 8px;opacity:0.5;pointer-events:none;transition:opacity 0.3s}
.mode-select.active{opacity:1;pointer-events:all}
.mode-btn{background:transparent;border:1px solid rgba(200,184,152,0.15);color:#6a6458;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:10px;font-family:inherit;transition:all 0.15s}
.mode-btn:hover{color:#c8b898;border-color:rgba(200,184,152,0.3)}
.mode-btn.active{color:#c8b898;border-color:#c8b898;background:rgba(200,184,152,0.1)}
#reset-cards{padding:3px 8px;font-size:10px}

/* ── Slider zoom ── */
#zoomSlider{width:100%;margin:6px 0 0;accent-color:#c8b898}
.zoom-labels{display:flex;justify-content:space-between;color:#5a5448;font-size:9px;margin-top:-2px}

/* ── Extras ── */
#back-link{position:absolute;top:16px;right:16px;z-index:10;color:#88ccff;font-size:12px;text-decoration:none;background:rgba(0,0,0,0.6);padding:5px 10px;border-radius:6px}
#back-link:hover{background:rgba(136,204,255,0.08)}
#status{position:absolute;bottom:16px;right:16px;z-index:10;color:#5a5448;font-size:11px;background:rgba(0,0,0,0.6);padding:4px 10px;border-radius:6px}
#status .ok{color:#4caf50}
#status .loading{color:#ffa726}
</style>
</head>
<body>

<a id=back-link href=index.html>← Volver</a>

<div id=ui>
  <h2>◈ Visor de Mesas</h2>

  <div class=section>🪵 Modelo</div>
  <button class="mesa-btn active" data-model="assets/mesas/mesa_organica_v01.glb">V1 · Detallada <span class=size>69 KB</span></button>
  <button class="mesa-btn" data-model="assets/mesas/mesa_organica_v02.glb">V2 · Zet <span class=size>16 KB</span></button>
  <button class="mesa-btn" data-model="assets/mesas/mesa_organica_v03.glb">V3 · Zet <span class=size>16 KB</span></button>
  <button class="mesa-btn" data-model="assets/mesas/mesa_v3_con_carta.glb">V3 + Carta <span class=size>21 KB</span></button>
  <button class="mesa-btn" data-model="assets/mesas/mesa_rectangular_v01.glb">Rectangular V1 <span class=size>25 KB</span></button>
  <button class="mesa-btn" data-model="assets/mesas/mesa_rectangular_v02.glb">Rectangular V2 <span class=size>25 KB</span></button>

  <div class=section>🎛️ Capas</div>
  
  <div class="toggle-row active" data-layer="mesa">
    <span class="toggle-switch on"></span> Mesa
  </div>
  <div class="toggle-row" data-layer="tapete">
    <span class="toggle-switch"></span> Tapete
  </div>
  <div class="toggle-row" data-layer="cartas">
    <span class="toggle-switch"></span> Cartas
  </div>

  <div class="mode-select" id="card-options">
    <button class="mode-btn active" data-mode="ordered">🎯 Ordenadas</button>
    <button class="mode-btn" data-mode="free">🖐️ Libres</button>
    <button class="mode-btn" id="reset-cards">⟲ Barajar</button>
  </div>

  <div class=section style="margin-top:12px">🔍 Zoom</div>
  <input type=range id=zoomSlider min=0.5 max=8 step=0.1 value=2.5>
  <div class=zoom-labels><span>3D</span><span>▼ cenital</span></div>
</div>

<div id=status><span class=ok>●</span> Mesa limpia</div>

<script type=importmap>
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type=module>
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

// ═══════════════════════════════════════════════
//  ESCENA BASE
// ═══════════════════════════════════════════════

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 100);
camera.position.set(0, 1.50, -2.8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.5;
controls.maxDistance = 6;
controls.minPolarAngle = 0;
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();
controls.saveState();

// ── LUCES ──
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dl = new THREE.DirectionalLight(0xffffff, 4);
dl.position.set(3, 6, 4);
dl.castShadow = true;
dl.shadow.mapSize.width = 1024;
dl.shadow.mapSize.height = 1024;
scene.add(dl);
const fl = new THREE.DirectionalLight(0x8888ff, 0.6);
fl.position.set(-2, 3, -3);
scene.add(fl);
const rim = new THREE.DirectionalLight(0xffdd99, 0.3);
rim.position.set(-1, 1, 4);
scene.add(rim);

// ── SUELO ──
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(6, 6),
  new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9, metalness: 0 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
floor.receiveShadow = true;
scene.add(floor);

// ═══════════════════════════════════════════════
//  SISTEMA DE CAPAS
// ═══════════════════════════════════════════════

const layers = {
  mesa: { visible: true,  objects: null },   // modelo 3D cargado
  tapete: { visible: false, objects: null },  // mesh plano sobre la mesa
  cartas: { visible: false, objects: [] },    // array de cartas
};

let tableSurfaceY = 0.33; // se actualiza al cargar cada mesa
let currentModel = null;

// ═══════════════════════════════════════════════
//  CARGA DE MODELOS (mesas)
// ═══════════════════════════════════════════════

const loader = new GLTFLoader();

function cargarModelo(url) {
  // Limpiar todo
  if (currentModel) { scene.remove(currentModel); currentModel = null; }
  limpiarTapete();
  limpiarCartas();

  document.querySelector('#status').innerHTML = '<span class=loading>●</span> Cargando...';

  loader.load(url, (gltf) => {
    const m = gltf.scene;
    m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });

    const box = new THREE.Box3();
    const meshes = [];
    m.traverse(c => { if (c.isMesh) { box.expandByObject(c); meshes.push(c); } });
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    meshes.forEach(mesh => { mesh.position.sub(center); });
    meshes.forEach(mesh => { mesh.position.y += size.y / 2; });

    tableSurfaceY = size.y;
    currentModel = m;

    // Solo añadir si la capa mesa está visible
    if (layers.mesa.visible) {
      scene.add(m);
    }
    layers.mesa.objects = m;

    controls.target.set(0, Math.min(size.y * 0.6, 0.6), 0);
    controls.update();
    controls.reset();

    document.querySelector('#status').innerHTML = '<span class=ok>●</span> Listo';
  }, (xhr) => {
    const p = Math.round((xhr.loaded / xhr.total) * 100);
    if (p < 100) document.querySelector('#status').innerHTML = `<span class=loading>●</span> ${p}%`;
  }, (err) => {
    document.querySelector('#status').innerHTML = '<span style=color:#f44>●</span> Error de carga';
    console.error(err);
  });
}

// ═══════════════════════════════════════════════
//  CAPA: TAPETE
// ═══════════════════════════════════════════════

let tapeteMesh = null;

function crearTapete() {
  if (tapeteMesh) return;
  const geo = new THREE.PlaneGeometry(0.45, 0.65);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x2a3a2a,
    roughness: 0.8,
    metalness: 0,
    side: THREE.DoubleSide,
  });
  tapeteMesh = new THREE.Mesh(geo, mat);
  tapeteMesh.rotation.x = -Math.PI / 2;
  tapeteMesh.position.y = tableSurfaceY + 0.002;
  tapeteMesh.receiveShadow = true;
  tapeteMesh.userData.isTapete = true;
}

function mostrarTapete(show) {
  if (show) {
    crearTapete();
    if (tapeteMesh && !tapeteMesh.parent) {
      scene.add(tapeteMesh);
    }
  } else {
    if (tapeteMesh && tapeteMesh.parent) {
      scene.remove(tapeteMesh);
    }
  }
  layers.tapete.visible = show;
}

function limpiarTapete() {
  if (tapeteMesh && tapeteMesh.parent) scene.remove(tapeteMesh);
  tapeteMesh = null;
}

// ═══════════════════════════════════════════════
//  CAPA: CARTAS
// ═══════════════════════════════════════════════

const CARD_W = 0.10;
const CARD_H = 0.14;
const CARD_D = 0.003;
const CARD_LIFT = 0.015;

const cards = [];
let cardMode = 'ordered';
let selectedCard = null;
let isDragging = false;

function crearCarta(index, color) {
  const group = new THREE.Group();
  group.userData.isCard = true;
  group.userData.index = index;

  // Cuerpo blanco
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf5f0e8, roughness: 0.3, metalness: 0.05 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(CARD_W, CARD_D, CARD_H), bodyMat);
  body.castShadow = true;
  group.add(body);

  // Diseño frontal
  const faceMat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.1, side: THREE.DoubleSide });
  const face = new THREE.Mesh(new THREE.PlaneGeometry(CARD_W * 0.85, CARD_H * 0.85), faceMat);
  face.position.y = CARD_D * 0.5 + 0.001;
  group.add(face);

  // Sombra bajo la carta
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.2, depthWrite: false });
  const shadow = new THREE.Mesh(new THREE.PlaneGeometry(CARD_W * 1.1, CARD_H * 1.1), shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.001;
  group.add(shadow);

  group.userData.body = body;
  group.userData.shadow = shadow;
  return group;
}

const CARD_COLORS = [0xd4a574, 0x7ab0d4, 0xa8d47a, 0xd47a7a, 0xd4aed4];

function generarCartasPrueba(cantidad = 5) {
  cards.length = 0;
  for (let i = 0; i < cantidad; i++) {
    const c = crearCarta(i, CARD_COLORS[i % CARD_COLORS.length]);
    cards.push(c);
  }
}

function posicionarCartas(mode) {
  const n = cards.length;
  if (mode === 'ordered') {
    const spacing = 0.035;
    const startX = -(n - 1) * spacing / 2;
    cards.forEach((c, i) => {
      c.position.set(startX + i * spacing, tableSurfaceY, 0);
      c.rotation.set(0, 0, 0);
    });
  } else {
    const radio = 0.06;
    cards.forEach((c, i) => {
      const angle = (i / n) * Math.PI * 2;
      c.position.set(
        Math.cos(angle) * radio + (Math.random() - 0.5) * 0.02,
        tableSurfaceY,
        Math.sin(angle) * radio + (Math.random() - 0.5) * 0.02
      );
      c.rotation.set(0, Math.random() * Math.PI * 2, 0);
    });
  }
}

function mostrarCartas(show) {
  if (show) {
    if (cards.length === 0) generarCartasPrueba(5);
    posicionarCartas(cardMode);
    cards.forEach(c => { if (!c.parent) scene.add(c); });
  } else {
    cards.forEach(c => { if (c.parent) scene.remove(c); });
  }
  layers.cartas.visible = show;
}

function limpiarCartas() {
  cards.forEach(c => { if (c.parent) scene.remove(c); });
  cards.length = 0;
}

// ═══════════════════════════════════════════════
//  INTERACCIÓN: ARRASTRE
// ═══════════════════════════════════════════════

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function getCardUnderPointer(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const targets = [];
  cards.forEach(carta => {
    if (carta.parent) {
      carta.traverse(child => {
        if (child.isMesh && !child.userData.isShadow) targets.push(child);
      });
    }
  });

  const hits = raycaster.intersectObjects(targets, false);
  if (hits.length > 0) {
    let hit = hits[0].object;
    while (hit.parent && !hit.parent.userData.isCard) hit = hit.parent;
    if (hit.parent && hit.parent.userData.isCard) return hit.parent;
  }
  return null;
}

function getTableIntersect(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -tableSurfaceY);
  const pt = new THREE.Vector3();
  return raycaster.ray.intersectPlane(plane, pt) ? pt : null;
}

// Solo arrastrar si capa cartas activa
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (e.button !== 0 || !layers.cartas.visible) return;
  const carta = getCardUnderPointer(e);
  if (!carta) return;

  selectedCard = carta;
  isDragging = false;
  controls.enabled = false;

  carta.position.y += CARD_LIFT;
  const s = carta.userData.shadow;
  if (s) { s.material.opacity = 0.35; s.scale.set(1.3, 1.3, 1); }
  const b = carta.userData.body;
  if (b) { b.material.emissive = new THREE.Color(0x444466); b.material.emissiveIntensity = 0.15; }

  e.preventDefault();
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!selectedCard) return;
  const pt = getTableIntersect(e);
  if (!pt) return;

  isDragging = true;
  if (cardMode === 'free') {
    selectedCard.position.x = pt.x;
    selectedCard.position.z = pt.z;
    selectedCard.rotation.y += e.movementX * 0.002;
  } else {
    selectedCard.position.x = Math.max(-0.3, Math.min(0.3, pt.x));
    selectedCard.position.z = 0;
  }
  selectedCard.position.y = tableSurfaceY + CARD_LIFT;
  renderer.domElement.style.cursor = 'grabbing';
});

renderer.domElement.addEventListener('pointerup', () => {
  if (!selectedCard) return;
  selectedCard.position.y = tableSurfaceY;
  const s = selectedCard.userData.shadow;
  if (s) { s.material.opacity = 0.2; s.scale.set(1, 1, 1); }
  const b = selectedCard.userData.body;
  if (b) { b.material.emissive = new THREE.Color(0x000000); b.material.emissiveIntensity = 0; }
  controls.enabled = true;
  selectedCard = null;
  isDragging = false;
  renderer.domElement.style.cursor = 'default';
});

renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

// ═══════════════════════════════════════════════
//  CONTROLES UI
// ═══════════════════════════════════════════════

// ── Botones de mesa ──
document.querySelectorAll('.mesa-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mesa-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    limpiarTapete();
    limpiarCartas();
    // Reset toggles a estado limpio
    setLayer('tapete', false);
    setLayer('cartas', false);
    document.querySelectorAll('.toggle-row').forEach(r => {
      if (r.dataset.layer === 'mesa') { r.classList.add('active'); r.querySelector('.toggle-switch').classList.add('on'); }
      if (r.dataset.layer === 'tapete') { r.classList.remove('active'); r.querySelector('.toggle-switch').classList.remove('on'); }
      if (r.dataset.layer === 'cartas') { r.classList.remove('active'); r.querySelector('.toggle-switch').classList.remove('on'); }
    });
    document.querySelector('#card-options').classList.remove('active');
    cargarModelo(btn.dataset.model);
  });
});

// ── Toggles de capas ──
function setLayer(name, show) {
  if (name === 'mesa' && currentModel) {
    if (show) { if (!currentModel.parent) scene.add(currentModel); }
    else { if (currentModel.parent) scene.remove(currentModel); }
    layers.mesa.visible = show;
  }
  if (name === 'tapete') mostrarTapete(show);
  if (name === 'cartas') mostrarCartas(show);
}

document.querySelectorAll('.toggle-row').forEach(row => {
  row.addEventListener('click', () => {
    const layer = row.dataset.layer;
    const sw = row.querySelector('.toggle-switch');
    const wasActive = sw.classList.contains('on');

    // Mesa no se puede desactivar (siempre visible)
    if (layer === 'mesa') return;

    const show = !wasActive;
    sw.classList.toggle('on', show);
    row.classList.toggle('active', show);
    setLayer(layer, show);

    // Mostrar/ocultar opciones de cartas
    document.querySelector('#card-options').classList.toggle('active', layer === 'cartas' && show);
  });
});

// ── Modo de cartas ──
document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cardMode = btn.dataset.mode;
    if (layers.cartas.visible) {
      posicionarCartas(cardMode);
    }
  });
});

document.querySelector('#reset-cards').addEventListener('click', () => {
  if (layers.cartas.visible) posicionarCartas(cardMode);
});

// ── Zoom ──
document.querySelector('#zoomSlider').addEventListener('input', (e) => {
  const dist = parseFloat(e.target.value);
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  camera.position.copy(controls.target).add(dir.multiplyScalar(-dist));
  controls.update();
});

// ═══════════════════════════════════════════════
//  INICIO
// ═══════════════════════════════════════════════

cargarModelo('assets/mesas/mesa_organica_v01.glb');

window.addEventListener('resize', () => {
  const a = window.innerWidth / window.innerHeight;
  camera.aspect = a;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

console.log('🃏 Visor modular listo — capas: mesa, tapete, cartas');
</script>
</body>
</html>
