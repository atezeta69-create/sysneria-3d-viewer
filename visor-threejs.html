<!DOCTYPE html>
<html lang=es>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Visor Three.js — Mesas 🃏</title>
<link rel=stylesheet href=css/visor.css>
</head>
<body>

<a id=back-link href=index.html>← Volver</a>

<div id=ui>
  <div id=ui-header>
    <h2>◈ Visor de Mesas</h2>
    <span id=collapse-btn title="Plegar / desplegar panel">➖</span>
  </div>
  <div id=ui-body>

  <div class=collapsible id=coll-modelo>
    <div class=collapsible-header data-collapse=modelo role=button aria-expanded=true tabindex=0>
      <span class=section style="margin:0">🪵 Modelo</span>
      <span class=collapse-icon>▼</span>
    </div>
    <div class=collapsible-body>
      <button class="mesa-btn active" data-model="assets/mesas/mesa_v01_sin_tapete.glb">🌳 Orgánica V1 <span class=size>68 KB</span></button>
      <button class="mesa-btn" data-model="assets/mesas/mesa_v02_sin_tapete.glb">🌳 Orgánica V2 <span class=size>44 KB</span></button>
      <button class="mesa-btn" data-model="assets/mesas/mesa_v03_sin_tapete.glb">🌳 Orgánica V3 <span class=size>34 KB</span></button>
      <button class="mesa-btn" data-model="assets/mesas/mesa_rectangular_v01.glb">Rectangular V1 <span class=size>25 KB</span></button>
      <button class="mesa-btn" data-model="assets/mesas/mesa_rectangular_v02.glb">Rectangular V2 <span class=size>25 KB</span></button>
    </div>
  </div>

  <div class=collapsible id=coll-capas>
    <div class=collapsible-header data-collapse=capas role=button aria-expanded=true tabindex=0>
      <span class=section style="margin:0">🎛️ Capas</span>
      <span class=collapse-icon>▼</span>
    </div>
    <div class=collapsible-body>
      <div class="toggle-row active" data-layer="mesa">
        <span class=layer-label style="margin-left:36px">Mesa</span>
      </div>
      <div class="toggle-row active" data-layer="tapete">
        <span class="toggle-switch on"></span><span class=layer-label>Tapete</span>
        <span class="lock-btn locked" data-lock="tapete" title="Bloquear tapete">🔒</span>
      </div>
      <div class="tapete-select" id="tapete-options">
        <button class="tapete-btn" data-tapete="Verde"><span class=color-dot style=background:#2a6a2a></span>Verde</button>
        <button class="tapete-btn" data-tapete="Rojo"><span class=color-dot style=background:#8a2a2a></span>Rojo</button>
        <button class="tapete-btn" data-tapete="Azul"><span class=color-dot style=background:#2a3a8a></span>Azul</button>
        <button class="tapete-btn" data-tapete="Amarillo"><span class=color-dot style=background:#8a8a2a></span>Amarillo</button>
      </div>
      <div class="toggle-row" data-layer="cartas">
        <span class="toggle-switch"></span><span class=layer-label>Cartas</span>
        <span class="lock-btn" data-lock="cartas" title="Bloquear cartas">🔓</span>
      </div>
    </div>
  </div>

  <div class=collapsible id=coll-baraja>
    <div class=collapsible-header data-collapse=baraja role=button aria-expanded=true tabindex=0>
      <span class=section style="margin:0">♠ Baraja</span>
      <span class=collapse-icon>▼</span>
    </div>
    <div class=collapsible-body>
      <select class=decks-select id=deck-select>
        <option value="poker_normal">♠ Poker</option>
        <option value="poker_cartoon">😄 Cartoon</option>
        <option value="espanola_40">🇪🇸 Española 40</option>
        <option value="espanola_48">🇪🇸 Española 48</option>
      </select>
    </div>
  </div>
  <div class=collapsible id=coll-dorso style=display:none>
    <div class=collapsible-header data-collapse=dorso role=button aria-expanded=true tabindex=0>
      <span class=section style="margin:0">🎴 Dorsos</span>
      <span class=collapse-icon>▼</span>
    </div>
    <div class=collapsible-body>
      <div class=source-select id=dorso-source-options style=opacity:1;pointer-events:auto;margin:0>
        <button class=source-btn active data-source=zeta>🎴 Zeta</button>
        <button class=source-btn data-source=miguel_gil>🎴 Miguel Gil</button>
      </div>
      <select class=dorso-dropdown id=dorso-dropdown style=margin:4px 0 0 0></select>
    </div>
  </div>
  <div class=collapsible id=coll-modo style=display:none>
    <div class=collapsible-header data-collapse=modo role=button aria-expanded=true tabindex=0>
      <span class=section style="margin:0">♻️ Reparto</span>
      <span class=collapse-icon>▼</span>
    </div>
    <div class=collapsible-body>
      <div class="face-row" id="face-toggle">
        <span class="face-label active" data-face="up">Cara</span>
        <div class="face-track" id="face-track">
          <div class="face-knob"></div>
        </div>
        <span class="face-label" data-face="down">Dorso</span>
      </div>
      <div class=mode-select id=card-options>
        <select class=mode-select-inline id=mode-select>
          <option value="fan">🃏 Abanico</option>
          <option value="row">📏 Fila</option>
          <option value="scatter">🖐️ Libres</option>
        </select>
        <button class=mode-btn id=reset-cards>⟲ Repartir</button>
      </div>
    </div>
  </div>

  <!-- Boton voltear carta (oculto por defecto, aparece al seleccionar) -->
  <div id="card-actions" style="display:none;margin:6px 0 0 8px;display:none;gap:4px">
    <button id="flip-btn" style="background:rgba(200,184,152,0.08);border:1px solid rgba(200,184,152,0.15);color:#c8b898;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.2s" title="Voltear carta (doble tap o clic derecho)">↻ Voltear</button>
    <button id="rot-left-btn" style="background:rgba(200,184,152,0.08);border:1px solid rgba(200,184,152,0.15);color:#c8b898;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.2s" title="Girar izquierda (R en teclado)">↺</button>
    <button id="rot-right-btn" style="background:rgba(200,184,152,0.08);border:1px solid rgba(200,184,152,0.15);color:#c8b898;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.2s" title="Girar derecha (Shift+R en teclado)">↻</button>
    <button id="btn-cuadrar" style="display:none;background:rgba(200,184,152,0.08);border:1px solid rgba(200,184,152,0.15);color:#c8b898;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.2s" title="Alinear posición y rotación de la pila (Q)">⬜ Cuadrar</button>
    <button id="btn-apilar" style="display:none;background:rgba(200,184,152,0.08);border:1px solid rgba(200,184,152,0.15);color:#c8b898;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.2s" title="Alinear solo posición de la pila">⬛ Apilar</button>
    <button id="btn-levantar" style="display:none;background:rgba(200,184,152,0.08);border:2px solid #88aacc;color:#aaccff;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.2s" title="Levantar toda la pila">🖐️</button>
    <button id="btn-levantar-n" style="display:none;background:rgba(200,184,152,0.08);border:1px solid rgba(200,184,152,0.15);color:#c8b898;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.2s" title="Levantar N cartas">🔢</button>
    <button id="btn-fusionar" style="display:none;background:rgba(100,150,200,0.08);border:1px solid rgba(100,150,200,0.15);color:#88aacc;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.2s" title="Fusionar todas las pilas superpuestas en una sola">🔗 Fusionar</button>
  </div>

<div id="levantar-n-input" style="display:none;margin:6px 0 0 8px;gap:6px;align-items:center;background:rgba(10,10,15,0.9);padding:6px 10px;border-radius:8px;border:1px solid rgba(200,184,152,0.2)">
  <span style="color:#c8b898;font-size:11px">Levantar</span>
  <input id="levantar-n-number" type="number" min="1" value="1" style="width:50px;background:rgba(20,18,14,0.9);color:#c8b898;border:1px solid rgba(200,184,152,0.2);border-radius:4px;padding:2px 6px;font-size:11px;text-align:center">
  <button id="btn-levantar-n-confirm" style="background:rgba(100,150,200,0.2);border:1px solid #88aacc;color:#aaccff;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit">OK</button>
  <button id="btn-levantar-n-cancel" style="background:rgba(200,100,100,0.1);border:1px solid rgba(200,100,100,0.3);color:#cc8888;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit">✕</button>
</div>

  <div class=section style="margin-top:12px">🔍 Zoom</div>
  <input type=range id=zoomSlider min=0.5 max=8 step=0.1 value=2.5>
  <div class=zoom-labels><span>3D</span><span>▼ cenital</span></div>

  <div class=collapsible id=coll-debug>
    <div class=collapsible-header data-collapse=debug role=button aria-expanded=false tabindex=0>
      <span>🐛 DEBUG</span>
      <span class=collapse-icon>▼</span>
    </div>
    <div class=collapsible-body>
      <div class=toggle-row id=debug-toggle>
        <span class="toggle-switch"></span> Identidad de carta
      </div>
      <button id="btn-descargar-logs" style="display:block;width:calc(100% - 8px);margin:6px 0 0 0;background:rgba(200,100,100,0.08);border:1px solid rgba(200,100,100,0.15);color:#cc8888;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:10px;font-family:inherit">📋 Descargar Logs</button>

      <div class=section>🧪 Tests</div>
      <button id="btn-run-tests" style="display:block;width:calc(100% - 8px);margin:6px 0 0 0;background:rgba(100,150,100,0.1);border:1px solid rgba(100,150,100,0.3);color:#aacc88;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit">▶ Ejecutar Tests</button>
      <button id="btn-export-tests" style="display:none;width:calc(100% - 8px);margin:4px 0 0 0;background:rgba(100,100,150,0.1);border:1px solid rgba(100,100,150,0.3);color:#aaaacc;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit">📤 Exportar</button>
      <div id="tests-results" style="display:none;margin:8px 0 0 0;max-height:200px;overflow-y:auto;background:rgba(0,0,0,0.4);padding:6px 8px;border-radius:6px;font-size:10px;font-family:monospace"></div>
      <div id="tests-summary" style="display:none;margin:6px 0 0 0;font-size:11px">
        <span style="color:#4caf50">✅ <span id="tests-passed">0</span></span>
        <span style="color:#f44336;margin-left:8px">❌ <span id="tests-failed">0</span></span>
      </div>
    </div>
  </div>
</div>
</div>

<div id=status><span class=ok>●</span> Mesa limpia</div>

<!-- Debug overlay: muestra identidad de carta seleccionada -->
<div id=debug-overlay style="display:none; position:fixed; bottom:20px; left:20px; background:rgba(0,0,0,0.8); color:#c8b898; padding:10px 16px; border-radius:8px; font-family:monospace; font-size:13px; line-height:1.6; border:1px solid rgba(200,184,152,0.2); z-index:1000; min-width:200px; pointer-events:none">
  <div style="font-size:11px; color:#887a60; margin-bottom:4px">🐛 DEBUG — Identidad de carta</div>
  <div id=debug-card-id></div>
</div>

<script type=importmap>
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type=module src=js/main.js></script>
</body>
</html>
