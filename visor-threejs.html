<!DOCTYPE html>
<html lang=es>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Visor Three.js — Mesas 🃏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#111;font-family:'Segoe UI',Arial,sans-serif;cursor:default}
/* Cursor mano: ocultar cursor nativo sobre el canvas */
canvas{cursor:none!important}

/* ── UI Panel ── */
#ui{position:absolute;top:16px;left:16px;color:#fff;background:rgba(10,10,15,0.85);padding:14px 16px;border-radius:12px;font-size:13px;min-width:220px;z-index:10;pointer-events:none;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.06);transition:all 0.3s ease}
#ui *{pointer-events:all}
#ui h2{font-size:13px;margin:0;color:#c8b898;letter-spacing:0.5px;font-weight:600}
#ui-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
#ui-body{transition:max-height 0.3s ease;overflow:hidden;max-height:600px}
#ui.collapsed #ui-body{max-height:0;margin-top:0;pointer-events:none}
#ui.collapsed{padding:10px 14px;min-width:auto}
#collapse-btn{cursor:pointer;font-size:14px;color:#6a6458;padding:2px 6px;border-radius:4px;user-select:none;transition:color 0.2s}
#collapse-btn:hover{color:#c8b898;background:rgba(255,255,255,0.06)}

/* ── Secciones ── */
.section{font-size:10px;color:#6a6458;margin:10px 0 4px 4px;text-transform:uppercase;letter-spacing:1px}

/* ── Botón mesa ── */
.mesa-btn{display:block;width:100%;text-align:left;background:transparent;border:none;color:#8a8478;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.15s;font-family:inherit}
.mesa-btn:hover{background:rgba(255,255,255,0.04);color:#c8b898}
.mesa-btn.active{background:rgba(200,184,152,0.1);color:#d4c5a9;border-left:2px solid #c8b898}
.mesa-btn .size{float:right;font-size:10px;color:#5a5448;margin-top:1px}

/* ── Toggle switches ── */
.toggle-row{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:#8a8478;transition:all 0.15s}
.toggle-row:hover{background:rgba(255,255,255,0.04);color:#c8b898}
.toggle-row.active{color:#d4c5a9}
.toggle-switch{width:28px;height:14px;background:#3a3428;border-radius:7px;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle-switch.on{background:#6a8a5a}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#8a8478;transition:all 0.2s}
.toggle-switch.on::after{left:16px;background:#c8b898}

/* ── Botón de bloqueo ── */
.lock-btn{font-size:14px;cursor:pointer;opacity:0.5;transition:opacity 0.2s;padding:2px 6px;border-radius:4px;user-select:none;display:inline-block}
.lock-btn:hover{opacity:1;background:rgba(255,255,255,0.06)}
.lock-btn.locked{opacity:1}
.lock-btn.locked:hover{background:rgba(255,100,100,0.1)}
.lock-row{display:flex;align-items:center;gap:4px;margin:4px 0 2px 8px;font-size:11px;color:#6a6458}
.lock-label{margin-right:8px}

/* ── Selector de dorsos: fuente + desplegable ── */
.source-select{display:flex;gap:4px;margin:6px 0 2px 8px;opacity:0.5;pointer-events:none;transition:opacity 0.3s}
.source-select.active{opacity:1;pointer-events:all}
.source-btn{background:transparent;border:1px solid rgba(200,184,152,0.15);color:#6a6458;padding:3px 0;border-radius:6px;cursor:pointer;font-size:10px;font-family:inherit;transition:all 0.15s;flex:1;text-align:center}
.source-btn:hover{color:#c8b898;border-color:rgba(200,184,152,0.3)}
.source-btn.active{color:#c8b898;border-color:#c8b898;background:rgba(200,184,152,0.1)}
.dorso-dropdown{width:calc(100% - 8px);margin:0 0 0 8px;padding:4px 6px;background:rgba(20,18,14,0.9);color:#c8b898;border:1px solid rgba(200,184,152,0.2);border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;opacity:0.5;pointer-events:none;transition:opacity 0.3s}
.dorso-dropdown.active{opacity:1;pointer-events:all}
.dorso-dropdown option{background:#1a1814;color:#c8b898}

/* ── Selector de baraja ── */
.deck-select{display:flex;gap:4px;margin:6px 0 0 8px;opacity:0.5;pointer-events:none;transition:opacity 0.3s;flex-wrap:wrap}
.deck-select.active{opacity:1;pointer-events:all}
.deck-btn{background:transparent;border:1px solid rgba(200,184,152,0.15);color:#6a6458;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:10px;font-family:inherit;transition:all 0.15s}
.deck-btn:hover{color:#c8b898;border-color:rgba(200,184,152,0.3)}
.deck-btn.active{color:#c8b898;border-color:#c8b898;background:rgba(200,184,152,0.1)}

/* ── Selector de tapete ── */
.tapete-select{display:flex;gap:4px;margin:6px 0 0 8px;opacity:0.5;pointer-events:none;transition:opacity 0.3s;flex-wrap:wrap}
.tapete-select.active{opacity:1;pointer-events:all}
.tapete-btn{background:transparent;border:1px solid rgba(200,184,152,0.15);color:#6a6458;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:10px;font-family:inherit;transition:all 0.15s}
.tapete-btn:hover{color:#c8b898;border-color:rgba(200,184,152,0.3)}
.tapete-btn.active{color:#c8b898;border-color:#c8b898;background:rgba(200,184,152,0.1)}
.tapete-btn .color-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* ── Modo de cartas ── */
.mode-select{display:flex;gap:4px;margin:6px 0 0 8px;opacity:0.5;pointer-events:none;transition:opacity 0.3s}
.mode-select.active{opacity:1;pointer-events:all}
.mode-btn{background:transparent;border:1px solid rgba(200,184,152,0.15);color:#6a6458;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:10px;font-family:inherit;transition:all 0.15s}
.mode-btn:hover{color:#c8b898;border-color:rgba(200,184,152,0.3)}
.mode-btn.active{color:#c8b898;border-color:#c8b898;background:rgba(200,184,152,0.1)}
#reset-cards{padding:3px 8px;font-size:10px}

/* ── Slider zoom ── */
#zoomSlider{width:100%;margin:6px 0 0;accent-color:#c8b898}
.zoom-labels{display:flex;justify-content:space-between;color:#5a5448;font-size:9px;margin-top:-2px}

/* ── Extras ── */
#back-link{position:absolute;top:16px;right:16px;z-index:10;color:#88ccff;font-size:12px;text-decoration:none;background:rgba(0,0,0,0.6);padding:5px 10px;border-radius:6px}
#back-link:hover{background:rgba(136,204,255,0.08)}
#status{position:absolute;bottom:16px;right:16px;z-index:10;color:#5a5448;font-size:11px;background:rgba(0,0,0,0.6);padding:4px 10px;border-radius:6px}
#status .ok{color:#4caf50}
#status .loading{color:#ffa726}
</style>
</head>
<body>

<a id=back-link href=index.html>← Volver</a>

<div id=ui>
  <div id=ui-header>
    <h2>◈ Visor de Mesas</h2>
    <span id=collapse-btn title="Plegar / desplegar panel">➖</span>
  </div>
  <div id=ui-body>

  <div class=section>🪵 Modelo</div>
  <button class="mesa-btn active" data-model="assets/mesas/mesa_v01_sin_tapete.glb">🌳 Orgánica V1 <span class=size>68 KB</span></button>
  <button class="mesa-btn" data-model="assets/mesas/mesa_v02_sin_tapete.glb">🌳 Orgánica V2 <span class=size>44 KB</span></button>
  <button class="mesa-btn" data-model="assets/mesas/mesa_v03_sin_tapete.glb">🌳 Orgánica V3 <span class=size>34 KB</span></button>
  <button class="mesa-btn" data-model="assets/mesas/mesa_rectangular_v01.glb">Rectangular V1 <span class=size>25 KB</span></button>
  <button class="mesa-btn" data-model="assets/mesas/mesa_rectangular_v02.glb">Rectangular V2 <span class=size>25 KB</span></button>

  <div class=section>🎛️ Capas</div>
  
  <div class="toggle-row active" data-layer="mesa">
    <span class="toggle-switch on"></span> Mesa
  </div>
  <div class="toggle-row" data-layer="tapete">
    <span class="toggle-switch"></span> Tapete
  </div>
  <div class="toggle-row" data-layer="cartas">
    <span class="toggle-switch"></span> Cartas
  </div>

  <div class="section" style="margin-top:2px">🔒 Bloquear</div>
  <div class="lock-row">
    <span class="lock-btn" data-lock="tapete" title="Bloquear tapete">🔓</span>
    <span class="lock-label">Tapete</span>
    <span class="lock-btn" data-lock="cartas" title="Bloquear cartas">🔓</span>
    <span class="lock-label">Cartas</span>
  </div>

  <div class="tapete-select" id="tapete-options">
    <button class="tapete-btn" data-tapete="Verde"><span class=color-dot style=background:#2a6a2a></span>Verde</button>
    <button class="tapete-btn" data-tapete="Rojo"><span class=color-dot style=background:#8a2a2a></span>Rojo</button>
    <button class="tapete-btn" data-tapete="Azul"><span class=color-dot style=background:#2a3a8a></span>Azul</button>
    <button class="tapete-btn" data-tapete="Amarillo"><span class=color-dot style=background:#8a8a2a></span>Amarillo</button>
  </div>

  <div class="deck-select" id="deck-options">
    <button class="deck-btn active" data-deck="poker_normal">♠ Poker</button>
    <button class="deck-btn" data-deck="poker_cartoon">😄 Cartoon</button>
    <button class="deck-btn" data-deck="espanola">🇪🇸 Española</button>
  </div>
  <div class=section style=margin-top:2px>🎴 Dorsos</div>
  <div class=source-select id=dorso-source-options>
    <button class=source-btn active data-source=zeta>🎴 Zeta</button>
    <button class=source-btn data-source=miguel_gil>🎴 Miguel Gil</button>
  </div>
  <select class=dorso-dropdown id=dorso-dropdown></select>

  <div class="mode-select" id="card-options">
    <button class="mode-btn active" data-mode="fan">🃏 Abanico</button>
    <button class="mode-btn" data-mode="row">📏 Fila</button>
    <button class="mode-btn" data-mode="scatter">🖐️ Libres</button>
    <button class="mode-btn" id="reset-cards">⟲ Repartir</button>
  </div>

  <div class=section style="margin-top:12px">🔍 Zoom</div>
  <input type=range id=zoomSlider min=0.5 max=8 step=0.1 value=2.5>
  <div class=zoom-labels><span>3D</span><span>▼ cenital</span></div>
</div>
</div>

<div id=status><span class=ok>●</span> Mesa limpia</div>

<script type=importmap>
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type=module>
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

// ═══════════════════════════════════════════════
//  CONFIGURACIÓN DE BARAJAS
// ═══════════════════════════════════════════════

const DECKS = {
  poker_normal: {
    label: 'Poker',
    path: 'assets/cartas/poker_normal/',
    ranks: ['As','2','3','4','5','6','7','8','9','10','Jota','Reina','Rey'],
    suits: ['Corazones','Diamantes','Picas','Treboles'],
    prefix: 'Carta_Poker_Normal_',
  },
  poker_cartoon: {
    label: 'Cartoon',
    path: 'assets/cartas/poker_cartoon/',
    ranks: ['As','2','3','4','5','6','7','8','9','10','Jota','Reina','Rey'],
    suits: ['Corazones','Diamantes','Picas','Treboles'],
    prefix: 'Carta_Poker_Cartoon_',
  },
  espanola: {
    label: 'Española',
    path: 'assets/cartas/espanola/',
    ranks: ['As','2','3','4','5','6','7','8','9','Sota','Caballo','Rey'],
    suits: ['Bastos','Copas','Espadas','Oros'],
    prefix: 'Carta_Espanola_',
  }
};

const TAPETES = ['Verde', 'Rojo', 'Azul', 'Amarillo'];

const DORSO_SOURCES = {
  zeta: {
    label: 'Zeta',
    dir: 'dorso_zeta',
    dorsos: [
      { file: 'dorso_zeta_base.png', label: '🎴 Base' },
      { file: 'dorso_zeta_acuatico.png', label: '🌊 Acuático' },
      { file: 'dorso_zeta_carnaval_001.png', label: '🎭 Carnaval 1' },
      { file: 'dorso_zeta_carnaval_002.png', label: '🎭 Carnaval 2' },
      { file: 'dorso_zeta_cartoon_01.png', label: '😄 Cartoon' },
      { file: 'dorso_zeta_esoterico_01.png', label: '🔮 Esotérico' },
      { file: 'dorso_zeta_espacial.png', label: '🚀 Espacial' },
      { file: 'dorso_zeta_lumen_01.png', label: '✨ Lumen' },
      { file: 'dorso_zeta_medieval_01.png', label: '🏰 Medieval' },
      { file: 'dorso_zeta_natura.png', label: '🌿 Natura' },
      { file: 'dorso_zeta_navidad.png', label: '🎄 Navidad' },
      { file: 'dorso_zeta_tecno_futurisca_01.png', label: '🤖 Tecno' },
      { file: 'dorso_zeta_tecnologico.png', label: '💻 Tecnológico' },
      { file: 'dorso_zeta_vintage_001.png', label: '📜 Vintage 1' },
      { file: 'dorso_zeta_vintage_002.png', label: '📜 Vintage 2' },
    ]
  },
  miguel_gil: {
    label: 'Miguel Gil',
    dir: 'dorso_miguel_gil',
    dorsos: [
      { file: 'dorso_miguel_gil_base_00.png', label: '🎴 Base 1' },
      { file: 'dorso_miguel_gil_base_01.png', label: '🎴 Base 2' },
      { file: 'dorso_miguel_gil_carnaval.png', label: '🎭 Carnaval' },
      { file: 'dorso_miguel_gil_espacial_001.png', label: '🚀 Espacial 1' },
      { file: 'dorso_miguel_gil_espacial_002.png', label: '🚀 Espacial 2' },
      { file: 'dorso_miguel_gil_industrial.png', label: '🏭 Industrial' },
      { file: 'dorso_miguel_gil_medieval.png', label: '🏰 Medieval' },
      { file: 'dorso_miguel_gil_navidad_001.png', label: '🎄 Navidad 1' },
      { file: 'dorso_miguel_gil_navidad_002.png', label: '🎄 Navidad 2' },
      { file: 'dorso_miguel_gil_tecno_futurista.png', label: '🤖 Tecno' },
      { file: 'dorso_miguel_gil_vintage.png', label: '📜 Vintage' },
    ]
  }
};

let currentDorsoSource = 'zeta';
let currentDorsoFile = DORSO_SOURCES.zeta.dorsos[0].file;
const dorsoTextureLoader = new THREE.TextureLoader();
let dorsoTexture = null; // textura del dorso actual
const CARD_SCALE = 0.8;
const CARD_LIFT = 0.015;
const TAPETE_THICKNESS = 0.003; // grosor del tapete (~3mm)
const CARD_OFFSET = TAPETE_THICKNESS / 2 + 0.001; // cartas justo encima del tapete

// ═══════════════════════════════════════════════
//  DORSO (textura trasera de las cartas)
// ═══════════════════════════════════════════════

function poblarDropdownDorsos(sourceKey) {
  const source = DORSO_SOURCES[sourceKey];
  const select = document.querySelector('#dorso-dropdown');
  select.innerHTML = '';
  source.dorsos.forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = d.file;
    opt.textContent = d.label;
    if (i === 0) opt.selected = true;
    select.appendChild(opt);
  });
}

function cargarTexturaDorso(sourceKey, file) {
  currentDorsoSource = sourceKey;
  currentDorsoFile = file;
  const source = DORSO_SOURCES[sourceKey];
  const url = `assets/cartas/dorsos/${source.dir}/${file}`;
  dorsoTextureLoader.load(url, (tex) => {
    dorsoTexture = tex;
    dorsoTexture.colorSpace = THREE.SRGBColorSpace;
    // Corregir espejado horizontal: la textura se ve al revés al rotar el plano
    dorsoTexture.wrapS = THREE.RepeatWrapping;
    dorsoTexture.repeat.x = -1;
    dorsoTexture.offset.x = 1;
    // Actualizar todas las cartas existentes
    cartas.forEach(c => {
      if (c.userData.dorsoMesh) {
        c.userData.dorsoMesh.material.map = tex;
        c.userData.dorsoMesh.material.needsUpdate = true;
      }
    });
  });
}

function anadirDorso(carta) {
  if (!dorsoTexture) return;

  // Medir el tamaño real de la carta a partir de sus mallas (excluyendo sombra)
  const box = new THREE.Box3();
  carta.traverse(c => { if (c.isMesh && !c.userData.isShadow && !c.userData.isDorso) box.expandByObject(c); });
  const size = box.getSize(new THREE.Vector3());
  let cardW = size.x;
  let cardH = size.z; // la carta está en XZ (horizontal)

  // Fallback si no se pudo medir (valores originales)
  if (cardW === 0 || cardH === 0) {
    cardW = 0.063 * CARD_SCALE;
    cardH = 0.088 * CARD_SCALE;
  }

  // Pequeño margen para que el dorso no se vea más pequeño que la carta
  cardW *= 1.01;
  cardH *= 1.01;

  const dorsoMat = new THREE.MeshStandardMaterial({
    map: dorsoTexture,
    side: THREE.DoubleSide,
    roughness: 0.7,
    metalness: 0,
  });
  const dorsoPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(cardW, cardH),
    dorsoMat
  );
  dorsoPlane.rotation.x = -Math.PI / 2; // horizontal (misma orientación que la carta)
  dorsoPlane.position.y = -0.0001; // ligeramente bajo la carta, pegado
  dorsoPlane.userData.isDorso = true;
  carta.add(dorsoPlane);
  carta.userData.dorsoMesh = dorsoPlane;
}

// Poblar dropdown + cargar textura de dorso por defecto al inicio
poblarDropdownDorsos('zeta');
cargarTexturaDorso('zeta', DORSO_SOURCES.zeta.dorsos[0].file);

// ═══════════════════════════════════════════════
//  ESCENA BASE
// ═══════════════════════════════════════════════

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 100);
camera.position.set(0, 1.50, -2.8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.5;
controls.maxDistance = 6;
controls.minPolarAngle = 0;
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();
controls.saveState();

// ── LUCES ──
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dl = new THREE.DirectionalLight(0xffffff, 4);
dl.position.set(3, 6, 4);
dl.castShadow = true;
dl.shadow.mapSize.width = 1024;
dl.shadow.mapSize.height = 1024;
dl.shadow.bias = -0.0005;
dl.shadow.normalBias = 0.02;
scene.add(dl);
const fl = new THREE.DirectionalLight(0x8888ff, 0.6);
fl.position.set(-2, 3, -3);
scene.add(fl);
const rim = new THREE.DirectionalLight(0xffdd99, 0.3);
rim.position.set(-1, 1, 4);
scene.add(rim);

// ── CURSOR 3D (mano que sigue al ratón) ──
const CURSOR_ENABLED = true;
let cursorState = 'reposo';
const cursorModels = {};
let cursorModelsLoaded = 0;
let cursorMouseScreen = new THREE.Vector2();
let cursorTargetPos = new THREE.Vector3();
let cursorSmoothPos = new THREE.Vector3();
const cursorGroup = new THREE.Group();
cursorGroup.visible = false;
scene.add(cursorGroup);

// Crossfade state
let cursorFading = false;
let cursorFadeStart = 0;
let cursorFadeDuration = 150;
let cursorFadeFrom = null;
let cursorFadeTo = null;
let cursorFadeFromKey = '';
let cursorFadeToKey = '';
let cursorPendingState = '';

function setCursorVisible(key, visible) {
  const obj = cursorModels[key];
  if (!obj) return;
  obj.visible = true;
  obj.traverse(c => { if (c.isMesh) c.material.opacity = visible ? 1 : 0; });
}

function cursorCrossfade(fromKey, toKey, duration) {
  cursorFading = true;
  cursorFadeStart = performance.now();
  cursorFadeDuration = duration || 150;
  cursorFadeFromKey = fromKey;
  cursorFadeToKey = toKey;
  cursorFadeFrom = cursorModels[fromKey];
  cursorFadeTo = cursorModels[toKey];
  if (cursorFadeFrom) cursorFadeFrom.visible = true;
  if (cursorFadeTo) cursorFadeTo.visible = true;
}

function updateCursorFade() {
  if (!cursorFading) return;
  const elapsed = performance.now() - cursorFadeStart;
  const t = Math.min(elapsed / cursorFadeDuration, 1);
  const eased = 1 - Math.pow(1 - t, 2);
  
  if (cursorFadeFrom) cursorFadeFrom.traverse(c => { if (c.isMesh) c.material.opacity = 1 - eased; });
  if (cursorFadeTo) cursorFadeTo.traverse(c => { if (c.isMesh) c.material.opacity = eased; });
  
  if (t >= 1) {
    cursorFading = false;
    if (cursorFadeFrom) cursorFadeFrom.traverse(c => { if (c.isMesh) c.material.opacity = 0; });
    if (cursorPendingState) {
      const next = cursorPendingState;
      cursorPendingState = '';
      enterCursorState(next);
    }
  }
}

function enterCursorState(newState) {
  cursorState = newState;
  switch (newState) {
    case 'reposo':
      Object.keys(cursorModels).forEach(k => setCursorVisible(k, k === 'mano_abierta'));
      break;
    case 'abriendo':
      cursorCrossfade('mano_abierta', 'dedos_sep', 150);
      cursorPendingState = 'cerrando';
      break;
    case 'cerrando':
      cursorCrossfade('dedos_sep', 'punio', 150);
      cursorPendingState = 'agarrado';
      break;
    case 'agarrado':
      Object.keys(cursorModels).forEach(k => setCursorVisible(k, k === 'punio'));
      break;
    case 'soltando':
      cursorCrossfade('punio', 'dedos_sep', 150);
      cursorPendingState = 'volviendo';
      break;
    case 'volviendo':
      cursorCrossfade('dedos_sep', 'mano_abierta', 150);
      cursorPendingState = 'reposo';
      break;
  }
}

function startGrabCursor() { if (cursorState === 'reposo') enterCursorState('abriendo'); }
function startReleaseCursor() { if (cursorState === 'agarrado') enterCursorState('soltando'); }

const layers = {

};

let tableSurfaceY = 0.33;
let currentModel = null;
let currentDeck = 'poker_normal';
let currentTapete = 'Verde';
let cardMode = 'fan';
let selectedObject = null; // objeto siendo arrastrado
let selectedCard = null; // carta seleccionada (no arrastrada)

// ═══════════════════════════════════════════════

function cargarModelo(url) {
  if (currentModel) { scene.remove(currentModel); currentModel = null; }
  limpiarTapete();
  limpiarCartas();

  document.querySelector('#status').innerHTML = '<span class=loading>●</span> Cargando...';

  loader.load(url, (gltf) => {
    const m = gltf.scene;
    m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });

    const box = new THREE.Box3();
    const meshes = [];
    m.traverse(c => { if (c.isMesh) { box.expandByObject(c); meshes.push(c); } });
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    meshes.forEach(mesh => { mesh.position.sub(center); });
    meshes.forEach(mesh => { mesh.position.y += size.y / 2; });

    tableSurfaceY = size.y;
    currentModel = m;

    if (layers.mesa.visible) { scene.add(m); }
    layers.mesa.objects = m;

    controls.target.set(0, Math.min(size.y * 0.6, 0.6), 0);
    controls.update();
    controls.reset();

    document.querySelector('#status').innerHTML = '<span class=ok>●</span> Listo';
  }, (xhr) => {
    const p = Math.round((xhr.loaded / xhr.total) * 100);
    if (p < 100) document.querySelector('#status').innerHTML = `<span class=loading>●</span> ${p}%`;
  }, (err) => {
    document.querySelector('#status').innerHTML = '<span style=color:#f44>●</span> Error de carga';
    console.error(err);
  });
}

let tapeteObject = null; // el GLB del tapete actual

function limpiarTapete() {
  if (tapeteObject && tapeteObject.parent) scene.remove(tapeteObject);
  tapeteObject = null;
}

function cargarTapete(color) {
  limpiarTapete();
  const url = `assets/cartas/tapetes/Tapete_${color}.glb`;
  document.querySelector('#status').innerHTML = '<span class=loading>●</span> Tapete...';
  
  loader.load(url, (gltf) => {
    const m = gltf.scene;
    m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
    m.userData.isTapete = true;
    m.userData.draggable = true;

    // Centrar y posicionar sobre la mesa
    const box = new THREE.Box3();
    m.traverse(c => { if (c.isMesh) box.expandByObject(c); });
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    m.traverse(c => { if (c.isMesh) { c.position.sub(center); } });
    m.position.set(0, tableSurfaceY, 0);
    
    tapeteObject = m;
    if (layers.tapete.visible) {
      scene.add(m);
    }
    document.querySelector('#status').innerHTML = '<span class=ok>●</span> Listo';
  }, undefined, (err) => {

function mostrarTapete(show) {
  if (show) {
    if (!tapeteObject) {
      cargarTapete(currentTapete);
    } else if (!tapeteObject.parent) {
      scene.add(tapeteObject);

      tapeteObject.position.y = tableSurfaceY;

    if (tapeteObject && tapeteObject.parent) scene.remove(tapeteObject);
  }
  layers.tapete.visible = show;
}

// ═══════════════════════════════════════════════
//  CAPA: CARTAS (cargadas individualmente)
// ═══════════════════════════════════════════════

const cartas = []; // array de objetos carta (THREE.Group)

function getDeckFilenames(deckKey) {
  const deck = DECKS[deckKey];
  const files = [];
  for (const suit of deck.suits) {
    for (const rank of deck.ranks) {
      files.push(`${deck.prefix}${rank}_${suit}.glb`);
    }
  }
  return files;
}

function limpiarCartas() {
  cartas.forEach(c => { if (c.parent) scene.remove(c); });
  cartas.length = 0;
}

function cargarBaraja(deckKey) {
  limpiarCartas();
  const deck = DECKS[deckKey];
  const files = getDeckFilenames(deckKey);
  const total = files.length;
  let loaded = 0;
  
  document.querySelector('#status').innerHTML = `<span class=loading>●</span> Baraja 0/${total}`;

  const cardLoader = new GLTFLoader();
  
  files.forEach((filename, index) => {
    const url = deck.path + filename;
    cardLoader.load(url, (gltf) => {
      const m = gltf.scene;
      m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
      m.userData.isCard = true;
      m.userData.draggable = true;
      m.userData.cardIndex = index;
      m.userData.deck = deckKey;

      // Escalar carta
      m.scale.set(CARD_SCALE, CARD_SCALE, CARD_SCALE);

      // Añadir sombra proyectada propia
      const shadowMat = new THREE.MeshBasicMaterial({
        color: 0x000000, transparent: true, opacity: 0.25, depthWrite: false
      });
      // Sombra del tamaño de la carta escalada
      const cardW = 0.063 * CARD_SCALE;
      const cardH = 0.088 * CARD_SCALE;
      const shadow = new THREE.Mesh(new THREE.PlaneGeometry(cardW * 1.1, cardH * 1.1), shadowMat);
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.y = -0.001;
      shadow.userData.isShadow = true;
      m.add(shadow);
      m.userData.shadow = shadow;

      // Añadir dorso (plano con textura detrás de la carta)
      anadirDorso(m);

      cartas.push(m);
      loaded++;

      if (loaded === total) {
        // Todas cargadas — posicionar
        posicionarCartas(cardMode);
        if (layers.cartas.visible) {
          cartas.forEach(c => { if (!c.parent) scene.add(c); });
        }
        document.querySelector('#status').innerHTML = `<span class=ok>●</span> ${total} cartas`;
      } else if (loaded % 10 === 0) {
        document.querySelector('#status').innerHTML = `<span class=loading>●</span> Baraja ${loaded}/${total}`;
      }
    }, undefined, (err) => {
      console.error('Error cargando carta:', filename, err);
      loaded++;
      if (loaded === total) {
        document.querySelector('#status').innerHTML = `<span style=color:#f44>●</span> Error en alguna carta`;
      }
    });
  });
}

function posicionarCartas(mode) {
  const n = cartas.length;
  if (n === 0) return;

  if (mode === 'row') {
    // 4 filas de N cartas cada una (N=13 para poker, 12 para espanola)
    const cardsPerRow = Math.ceil(n / 4);
    const spacingX = 0.045 * CARD_SCALE;
    const spacingZ = 0.065 * CARD_SCALE;
    const rowWidth = (cardsPerRow - 1) * spacingX;
    const rowHeight = 3 * spacingZ;
    
    cartas.forEach((c, i) => {
      const row = Math.floor(i / cardsPerRow);
      const col = i % cardsPerRow;
      c.position.set(
        col * spacingX - rowWidth / 2,
        tableSurfaceY + CARD_OFFSET,
        row * spacingZ - rowHeight / 2
      );
      c.rotation.set(0, 0, 0);
    });
  } else if (mode === 'fan') {
    // Abanico
    const radius = 0.35;
    const angleRange = Math.PI * 0.6;
    cartas.forEach((c, i) => {
      const angle = -angleRange / 2 + (i / Math.max(n - 1, 1)) * angleRange;
      c.position.set(
        Math.sin(angle) * radius,
        tableSurfaceY + CARD_OFFSET,
        -Math.cos(angle) * radius + radius
      );
      c.rotation.set(0, -angle, 0);
    });
  } else {
    // Scatter libre
    const spread = 0.25;
    cartas.forEach((c, i) => {
      c.position.set(
        (Math.random() - 0.5) * spread * 2,
        tableSurfaceY + CARD_OFFSET,
        (Math.random() - 0.5) * spread * 1.5 + 0.1
      );
      c.rotation.set(0, Math.random() * Math.PI * 2, 0);
    });
  }
}

function mostrarCartas(show) {
  if (show) {
    if (cartas.length === 0) {
      cargarBaraja(currentDeck);
    } else {
      posicionarCartas(cardMode);
      cartas.forEach(c => { if (!c.parent) scene.add(c); });
    }
  } else {
    cartas.forEach(c => { if (c.parent) scene.remove(c); });
  }
  layers.cartas.visible = show;
}

//  VARIABLES GLOBALES

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const CLICK_THRESHOLD = 5; // px para distinguir click de drag
let pointerStartPos = { x: 0, y: 0 };
let isPointerDown = false;
let highlightLines = null; // borde de carta seleccionada
let tapeteHighlight = null; // borde de tapete seleccionado

function getDraggableUnderPointer(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const targets = [];
  // Cartas (solo si no están bloqueadas)
  if (!locks.cartas) {
    cartas.forEach(obj => {
      if (obj.parent) {
        obj.traverse(child => {
          if (child.isMesh && !child.userData.isShadow) targets.push(child);
        });
      }
    });
  }
  // Tapete (solo si no está bloqueado)
  if (!locks.tapete && tapeteObject && tapeteObject.parent) {
    tapeteObject.traverse(child => {
      if (child.isMesh) targets.push(child);
    });
  }

  const hits = raycaster.intersectObjects(targets, false);
  if (hits.length > 0) {
    let hit = hits[0].object;
    while (hit.parent) {
      if (hit.parent.userData && hit.parent.userData.draggable) return hit.parent;
      hit = hit.parent;
    }
  }
  return null;
}

function getTableIntersect(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -tableSurfaceY);
  const pt = new THREE.Vector3();
  return raycaster.ray.intersectPlane(plane, pt) ? pt : null;
}

// ═══════════════════════════════════════════════
//  INTERACCIÓN: CLICK / ARRASTRE / SELECCIÓN
// ═══════════════════════════════════════════════

function clearSelection() {
  if (highlightLines && highlightLines.parent) scene.remove(highlightLines);
  if (tapeteHighlight && tapeteHighlight.parent) scene.remove(tapeteHighlight);
  highlightLines = null;
  tapeteHighlight = null;
  selectedCard = null;
  selectedTapete = null;
  controls.enableZoom = true;
}

function selectCard(carta) {
  clearSelection();
  if (!carta) return;
  selectedCard = carta;
  controls.enableZoom = false;
  
  // Crear borde de selección (outline)
  const box = new THREE.Box3().setFromObject(carta);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  
  const geo = new THREE.BoxGeometry(size.x * 1.1, 0.002, size.z * 1.1);
  const edges = new THREE.EdgesGeometry(geo);
  highlightLines = new THREE.LineSegments(
    edges,
    new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.7 })
  );
  highlightLines.position.copy(carta.position);
  highlightLines.position.y += 0.001;
  scene.add(highlightLines);
}

function selectTapete(tapete) {
  clearSelection();
  if (!tapete) return;
  selectedTapete = tapete;
  controls.enableZoom = false;

  // Crear borde de selección (azul para diferenciar de cartas)
  const box = new THREE.Box3().setFromObject(tapete);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const geo = new THREE.BoxGeometry(size.x * 1.05, 0.002, size.z * 1.05);
  const edges = new THREE.EdgesGeometry(geo);
  tapeteHighlight = new THREE.LineSegments(
    edges,
    new THREE.LineBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.6 })
  );
  tapeteHighlight.position.copy(tapete.position);
  tapeteHighlight.position.y += 0.002;
  scene.add(tapeteHighlight);
}

// ── Pointer events ──
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (e.button !== 0) return;
  pointerStartPos.x = e.clientX;
  pointerStartPos.y = e.clientY;
  isPointerDown = true;
  const obj = getDraggableUnderPointer(e);
  if (!obj) { clearSelection(); return; }
  
  // Si es carta, la pre-seleccionamos (aún no sabemos si es click o drag)
  if (obj.userData.isCard) {
    selectCard(obj);
    selectedObject = obj;
    isDragging = false;
    controls.enabled = false;
    // Levantar ligeramente (preparado para posible drag)
    obj.position.y = tableSurfaceY + CARD_OFFSET + CARD_LIFT;
    const s = obj.userData.shadow;
    if (s) { s.material.opacity = 0.4; s.scale.set(1.3, 1.3, 1); }
    renderer.domElement.style.cursor = 'grabbing';
    startGrabCursor();
  } else if (obj.userData.isTapete) {
    // Tapete: seleccionar primero, arrastrar solo si mueve
    selectTapete(obj);
    selectedObject = obj;
    isDragging = false;
    controls.enabled = false;
    obj.position.y += CARD_LIFT * 2;
    renderer.domElement.style.cursor = 'grabbing';
  }
  e.preventDefault();
});

renderer.domElement.addEventListener('pointermove', (e) => {
  // Actualizar posición del cursor 3D
  cursorLastClientX = e.clientX;
  cursorLastClientY = e.clientY;
  
  // Cursor hover
  if (!selectedObject && !isPointerDown) {
    const obj = getDraggableUnderPointer(e);
    renderer.domElement.style.cursor = obj ? 'grab' : 'default';
    return;
  }
  
  // Si estábamos en pointerdown pero no hemos movido lo suficiente, esperar
  if (isPointerDown && !isDragging) {
    const dx = Math.abs(e.clientX - pointerStartPos.x);
    const dy = Math.abs(e.clientY - pointerStartPos.y);
    if (dx < CLICK_THRESHOLD && dy < CLICK_THRESHOLD) return;
    isDragging = true;
  }
  
  if (!selectedObject) return;
  const pt = getTableIntersect(e);
  if (!pt) return;

  isDragging = true;
  selectedObject.position.x = pt.x;
  selectedObject.position.z = pt.z;
  if (selectedObject.userData.isCard) {
    selectedObject.position.y = tableSurfaceY + CARD_OFFSET + CARD_LIFT;
  } else if (selectedObject.userData.isTapete) {
    selectedObject.position.y = tableSurfaceY + CARD_LIFT * 2;
  }
  // Mover el borde de selección con la carta o tapete
  if (highlightLines && selectedObject.userData.isCard) {
    highlightLines.position.copy(selectedObject.position);
    highlightLines.position.y += 0.001;
  }
  if (tapeteHighlight && selectedObject.userData.isTapete) {
    tapeteHighlight.position.copy(selectedObject.position);
    tapeteHighlight.position.y += 0.002;
  }
  renderer.domElement.style.cursor = 'grabbing';
});

renderer.domElement.addEventListener('pointerup', () => {
  isPointerDown = false;
  if (!selectedObject) return;
  
  if (selectedObject.userData.isCard) {
    selectedObject.position.y = tableSurfaceY + CARD_OFFSET;
    const s = selectedObject.userData.shadow;
    if (s) { s.material.opacity = 0.25; s.scale.set(1, 1, 1); }
    // Si no hubo arrastre (fue un click), mantener seleccionada
    if (!isDragging) {
      selectCard(selectedObject);
    }
  } else if (selectedObject.userData.isTapete) {
    selectedObject.position.y = tableSurfaceY;
    // Si no hubo arrastre, mantener seleccionado
    if (!isDragging) {
      selectTapete(selectedObject);
    } else {
      // Si se movió, mantener borde en posición final
      if (tapeteHighlight) {
        tapeteHighlight.position.copy(selectedObject.position);
        tapeteHighlight.position.y += 0.002;
      }
    }
  }

  controls.enabled = true;
  selectedObject = null;
  isDragging = false;
  renderer.domElement.style.cursor = 'default';
  startReleaseCursor();
});

// ── Rueda del ratón: rotar carta o tapete seleccionado ──
renderer.domElement.addEventListener('wheel', (e) => {
  if (!selectedCard && !selectedTapete) return;
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.15 : 0.15; // ~8.6° por step
  if (selectedCard) {
    selectedCard.rotation.y += delta;
    if (highlightLines) highlightLines.rotation.y = selectedCard.rotation.y;
  }
  if (selectedTapete) {
    selectedTapete.rotation.y += delta;
    if (tapeteHighlight) tapeteHighlight.rotation.y = selectedTapete.rotation.y;
  }
}, { passive: false });

// ── Click derecho: flip de carta seleccionada ──
renderer.domElement.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (selectedCard) {
    selectedCard.rotation.x += Math.PI;
    if (highlightLines) highlightLines.rotation.x = selectedCard.rotation.x;
  }
});

// ── Atajos de teclado ──
document.addEventListener('keydown', (e) => {
  // No interferir con inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  // Escape: limpiar selección
  if (e.key === 'Escape') {
    clearSelection();
    return;
  }

  // R / Shift+R: rotar seleccionado
  if (e.key === 'r' || e.key === 'R') {
    const rot = e.shiftKey ? -0.26 : 0.26; // ~15°
    if (selectedCard) {
      selectedCard.rotation.y += rot;
      if (highlightLines) highlightLines.rotation.y = selectedCard.rotation.y;
    } else if (selectedTapete) {
      selectedTapete.rotation.y += rot;
      if (tapeteHighlight) tapeteHighlight.rotation.y = selectedTapete.rotation.y;
    }
    e.preventDefault();
  }

  // F: flip de carta seleccionada
  if ((e.key === 'f' || e.key === 'F') && selectedCard) {
    selectedCard.rotation.x += Math.PI;
    if (highlightLines) highlightLines.rotation.x = selectedCard.rotation.x;
    e.preventDefault();
  }
});

    document.querySelectorAll('.toggle-row').forEach(r => {
      if (r.dataset.layer === 'mesa') { r.classList.add('active'); r.querySelector('.toggle-switch').classList.add('on'); }
      if (r.dataset.layer === 'tapete') { r.classList.remove('active'); r.querySelector('.toggle-switch').classList.remove('on'); }
      if (r.dataset.layer === 'cartas') { r.classList.remove('active'); r.querySelector('.toggle-switch').classList.remove('on'); }
    });
    document.querySelector('#tapete-options').classList.remove('active');
    document.querySelector('#deck-options').classList.remove('active');
    document.querySelector('#card-options').classList.remove('active');
    cargarModelo(btn.dataset.model);
  });
});

// ── Toggles de capas ──
function setLayer(name, show) {
  if (name === 'mesa' && currentModel) {
    if (show) { if (!currentModel.parent) scene.add(currentModel); }
    else { if (currentModel.parent) scene.remove(currentModel); }
    layers.mesa.visible = show;
  }
  if (name === 'tapete') mostrarTapete(show);
  if (name === 'cartas') mostrarCartas(show);
}

document.querySelectorAll('.toggle-row').forEach(row => {
  row.addEventListener('click', () => {
    const layer = row.dataset.layer;
    const sw = row.querySelector('.toggle-switch');
    const wasActive = sw.classList.contains('on');
    if (layer === 'mesa') return;

    const show = !wasActive;
    sw.classList.toggle('on', show);
    row.classList.toggle('active', show);
    setLayer(layer, show);

    // Mostrar opciones contextuales
    document.querySelector('#tapete-options').classList.toggle('active', layer === 'tapete' && show);
    document.querySelector('#deck-options').classList.toggle('active', layer === 'cartas' && show);
    document.querySelector('#dorso-source-options').classList.toggle('active', layer === 'cartas' && show);
    document.querySelector('#dorso-dropdown').classList.toggle('active', layer === 'cartas' && show);
    document.querySelector('#card-options').classList.toggle('active', layer === 'cartas' && show);
  });
});

// ── Selector de baraja ──
document.querySelectorAll('.deck-btn[data-deck]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.deck-btn[data-deck]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const newDeck = btn.dataset.deck;
    if (newDeck !== currentDeck && layers.cartas.visible) {
      currentDeck = newDeck;
      cargarBaraja(currentDeck);
    } else {
      currentDeck = newDeck;
    }
  });
});

// ── Selector de dorso: fuente (Zeta / Miguel Gil) ──
document.querySelectorAll('.source-btn[data-source]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.source-btn[data-source]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const source = btn.dataset.source;
    poblarDropdownDorsos(source);
    // Cargar el primer dorso de esa fuente automáticamente
    const first = DORSO_SOURCES[source].dorsos[0];
    cargarTexturaDorso(source, first.file);
  });
});

// ── Selector de dorso: desplegable ──
document.querySelector('#dorso-dropdown').addEventListener('change', (e) => {
  cargarTexturaDorso(currentDorsoSource, e.target.value);
});

// ── Selector de tapete ──
document.querySelectorAll('.tapete-btn[data-tapete]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tapete-btn[data-tapete]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTapete = btn.dataset.tapete;
    if (layers.tapete.visible) {
      cargarTapete(currentTapete);
      if (tapeteObject && !tapeteObject.parent) scene.add(tapeteObject);
    }
  });
});

// ── Modo de cartas ──
document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cardMode = btn.dataset.mode;
    if (layers.cartas.visible) {
      posicionarCartas(cardMode);
    }
  });
});

document.querySelector('#reset-cards').addEventListener('click', () => {
  if (layers.cartas.visible) {
    posicionarCartas(cardMode);
  }
});

// ── Zoom ──
document.querySelector('#zoomSlider').addEventListener('input', (e) => {
  const dist = parseFloat(e.target.value);
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  camera.position.copy(controls.target).add(dir.multiplyScalar(-dist));
  controls.update();
});

// ═══════════════════════════════════════════════
//  INICIO
// ═══════════════════════════════════════════════

// Cargar la primera mesa del selector (Orgánica V1)
const firstMesaBtn = document.querySelector('.mesa-btn');
if (firstMesaBtn) cargarModelo(firstMesaBtn.dataset.model);

window.addEventListener('resize', () => {
  const a = window.innerWidth / window.innerHeight;
  camera.aspect = a;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  
  // Cursor 3D: seguir al ratón sobre la mesa
  if (CURSOR_ENABLED && cursorGroup.visible && cursorModels.mano_abierta) {
    // Proyectar ratón en el plano de la mesa
    const rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((cursorLastClientX || rect.left + rect.width/2) - rect.left) / rect.width * 2 - 1;
    pointer.y = -((cursorLastClientY || rect.top + rect.height/2) - rect.top) / rect.height * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -tableSurfaceY);
    const pt = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(plane, pt)) {
      // Lerp suave
      cursorSmoothPos.lerp(pt, 0.25);
      cursorGroup.position.x = cursorSmoothPos.x;
      cursorGroup.position.z = cursorSmoothPos.z;
      cursorGroup.position.y = tableSurfaceY + CURSOR_HEIGHT_OFFSET;
    }
    
    // Actualizar crossfade
    updateCursorFade();
    
    // Rotar mano para que siempre apunte hacia arriba (12) desde la vista actual
    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    const azimuth = Math.atan2(camDir.x, camDir.z);
    cursorGroup.rotation.y = azimuth - Math.PI / 2;
  }
  
  controls.update();
  renderer.render(scene, camera);
}
animate();
