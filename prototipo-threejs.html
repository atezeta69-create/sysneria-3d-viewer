<!DOCTYPE html>
<html lang=es>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Visor Three.js — Mesa Referencia</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#111;font-family:'Segoe UI',Arial,sans-serif}
  #ui{position:absolute;top:20px;left:20px;color:#fff;background:rgba(0,0,0,0.8);padding:14px 18px;border-radius:12px;font-size:13px;min-width:180px;z-index:10;pointer-events:none;backdrop-filter:blur(8px)}
  #ui *{pointer-events:all}
  #ui h2{font-size:14px;margin:0 0 6px;color:#88ccff}
  #ui label{display:block;margin:6px 0 2px;color:#aaa;font-size:12px}
  #zoomSlider{width:100%;margin:4px 0}
  #info{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#888;font-size:12px;background:rgba(0,0,0,0.6);padding:6px 14px;border-radius:6px;z-index:10}
  #status{position:absolute;top:20px;right:20px;color:#888;font-size:12px;background:rgba(0,0,0,0.6);padding:6px 12px;border-radius:6px;z-index:10}
  #status .ok{color:#4caf50}
  #status .loading{color:#ffa726}
</style>
</head>
<body>

<div id=ui>
  <h2>◈ Mesa referencia</h2>
  <label>Zoom</label>
  <input type=range id=zoomSlider min=0.3 max=8 step=0.1 value=1.0>
  <div style=display:flex;justify-content:space-between;color:#666;font-size:10px>
    <span>3D</span><span>▼ cenital</span>
  </div>
</div>

<div id=info>🖱 Rueda=zoom · Click+arrastrar=pan · Ctrl+rueda=rotar</div>
<div id=status><span class=loading>●</span> Cargando modelo...</div>

<script type=importmap>
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type=module>
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

// ─── ESCENA ─────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// ─── CÁMARA PERSPECTIVA (única) ──────────────
const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 100);
camera.position.set(0, 1.70, -3.0);

// ─── RENDERER ────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ─── CONTROLES ───────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.75, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Límites: la cámara se acerca y aleja libremente
controls.minDistance = 0.3;
controls.maxDistance = 8;

// Permitir rotación libre, pero darle un toque suave
controls.minPolarAngle = 0;       // cenital total
controls.maxPolarAngle = Math.PI / 2.2;  // casi a ras de mesa

controls.update();
controls.saveState();

// ─── LUCES ───────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl = new THREE.DirectionalLight(0xffffff, 3);
dl.position.set(3, 6, 4);
dl.castShadow = true;
dl.shadow.mapSize.width = 1024;
dl.shadow.mapSize.height = 1024;
scene.add(dl);
const fl = new THREE.DirectionalLight(0x8888ff, 0.5);
fl.position.set(-2, 3, -3);
scene.add(fl);

// ─── SUELO ───────────────────────────────────
const flr = new THREE.Mesh(
  new THREE.PlaneGeometry(8, 8),
  new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.9 })
);
flr.rotation.x = -Math.PI / 2;
flr.position.y = -0.01;
flr.receiveShadow = true;
scene.add(flr);

// ─── CARGA DEL MODELO ────────────────────────
const loader = new GLTFLoader();

loader.load('assets/mesa_referencia.glb', (gltf) => {
  const m = gltf.scene;
  m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  scene.add(m);
  document.querySelector('#status').innerHTML = '<span class=ok>●</span> Listo';
  // Posición inicial validada
  controls.reset();
}, (xhr) => {
  const p = Math.round((xhr.loaded / xhr.total) * 100);
  document.querySelector('#status').innerHTML = `<span class=loading>●</span> Cargando ${p}%`;
}, (err) => {
  document.querySelector('#status').innerHTML = '<span style=color:#f44>●</span> Error';
  console.error(err);
});

// ─── ZOOM ─────────────────────────────────────
const slider = document.querySelector('#zoomSlider');
slider.addEventListener('input', (e) => {
  const z = parseFloat(e.target.value);
  // Mapeamos el slider a la distancia de cámara
  // Slider 0.3 → cerca (0.3m), Slider 8 → lejos (8m)
  const dist = z;
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  camera.position.copy(controls.target).add(dir.multiplyScalar(-dist));
  controls.update();
});

// ─── RESIZE ──────────────────────────────────
window.addEventListener('resize', () => {
  const a = window.innerWidth / window.innerHeight;
  camera.aspect = a;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── ANIMACIÓN ───────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
