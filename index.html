<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SysNerIA — Visor 3D</title>

<!-- model-viewer CDN -->
<script type="importmap">
{
  "imports": {
    "@google/model-viewer": "https://esm.sh/@google/model-viewer@4.1.0"

<style>
  /* ===== RESET ===== */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0dcd0;
    height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== LAUNCHER (modo minimalista) ===== */
  #launcher {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    background: #0a0a0f;
    position: relative;
    z-index: 20;
    transition: opacity 0.4s ease;
  }

  #launcher.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .launcher-content {
    text-align: center;
  }

  .launcher-logo {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #b8a88a, #d4c5a9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 60px;
  }

  .launcher-buttons {
    display: flex;
    gap: 24px;
    justify-content: center;
    align-items: flex-start;
  }

  .launcher-btn {
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 36px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: #e0dcd0;
    min-width: 180px;
    text-align: center;
  }

  .launcher-btn:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.2);
    color: #fff;
  }

  .launcher-btn:active {
    transform: scale(0.97);
  }

  /* Dropdown container */
  .launcher-btn-group {
    position: relative;
  }

  .launcher-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 6px;
    min-width: 200px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    z-index: 30;
  }

  .launcher-dropdown.open {
    display: block;
  }

  .launcher-dropdown button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: #8a8478;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.15s;
  }

  .launcher-dropdown button:hover {
    background: rgba(255,255,255,0.04);
    color: #d4c5a9;
  }

  .launcher-dropdown button:active {
    background: rgba(212,197,169,0.08);
  }

  /* ===== VIEWER SECTION (oculto hasta elegir escenario) ===== */
  #viewer-section {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }

  #viewer-section.active {
    display: flex;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 10;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #b8a88a, #d4c5a9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header .badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: #8a8478;
    border: 1px solid rgba(255,255,255,0.06);
  }

  #header-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .nav-select {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #c8b898;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  .nav-select:hover {
    border-color: rgba(212,197,169,0.3);
  }

  .nav-select option {
    background: #1a1814;
    color: #c8b898;
  }

  #back-launcher {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    color: #8a8478;
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.2s;
  }

  #back-launcher:hover {
    background: rgba(255,255,255,0.04);
    color: #d4c5a9;
    border-color: rgba(212,197,169,0.2);
  }

  /* ===== MODEL VIEWER ===== */
  #viewer-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #08080c;
  }

  model-viewer {
    width: 100%;
    height: 100%;
    --progress-bar-color: #d4c5a9;
    --progress-bar-height: 2px;
  }

  /* ===== LOADING OVERLAY ===== */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #08080c;
    z-index: 5;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }

  #loading.hidden {
    opacity: 0;
  }

  #loading .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid rgba(212,197,169,0.15);
    border-top-color: #d4c5a9;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p {
    font-size: 12px;
    color: #6a6458;
    letter-spacing: 1px;
  }

  /* ===== CORS WARNING ===== */
  #cors-warning {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    display: none;
    align-items: flex-start;
    gap: 12px;
    background: rgba(30,20,10,0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212,180,100,0.2);
    border-radius: 16px;
    padding: 18px 20px;
    max-width: 320px;
    width: 85%;
    color: #e0dcd0;
    font-size: 13px;
    line-height: 1.5;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  #cors-warning .icon {
    font-size: 24px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  #cors-warning strong {
    display: block;
    color: #d4c5a9;
    margin-bottom: 4px;
    font-weight: 600;
  }

  #cors-warning p {
    color: #8a8478;
    font-size: 12px;
    margin: 0;
  }

  #cors-warning code {
    display: inline-block;
    background: rgba(255,255,255,0.06);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    color: #b8a88a;
  }

  #cors-close {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    color: #5a5448;
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
  }

  /* ===== SCENE INFO OVERLAY ===== */
  #scene-info {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 3;
    max-width: 60%;
    width: auto;
  }

  #scene-info h2 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    margin-bottom: 4px;
  }

  #scene-info p {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }

  /* ===== CONTROLS HINT ===== */
  #controls-hint {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    text-align: right;
    line-height: 1.6;
    pointer-events: none;
    z-index: 2;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  }

  /* ===== AR MODE (solo mobile) ===== */
  #ar-button {
    position: absolute;
    bottom: 90px;
    right: 14px;
    z-index: 3;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  #ar-button:active {
    background: rgba(255,255,255,0.2);
  }

  /* ===== AUTO-ROTATE TOGGLE ===== */
  #rotate-toggle {
    position: absolute;
    bottom: 140px;
    right: 14px;
    z-index: 3;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  #rotate-toggle:active {
    background: rgba(255,255,255,0.2);
  }

  #rotate-toggle.paused {
    background: rgba(212,180,100,0.2);
    border-color: rgba(212,180,100,0.3);
  }

  /* ===== THREE CONTEXT PANELS (Virtual Tour Style) ===== */

  /* Panel base */
  .ctx-panel {
    position: absolute;
    z-index: 3;
    background: rgba(10,10,15,0.78);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 8px 6px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    pointer-events: auto;
  }

  .ctx-panel .panel-header {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #4a4438;
    text-align: center;
    padding-bottom: 6px;
    margin-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  /* Left panel — vertical tools */
  .ctx-panel.left {
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    flex-direction: column;
    display: flex;
    gap: 2px;
    min-width: 44px;
  }

  /* Right panel — vertical settings */
  .ctx-panel.right {
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    flex-direction: column;
    display: flex;
    gap: 2px;
    min-width: 44px;
  }

  /* Center panel — horizontal camera controls */
  .ctx-panel.center {
    left: 50%;
    transform: translateX(-50%);
    bottom: 90px;
    flex-direction: row;
    display: flex;
    gap: 2px;
    padding: 6px 10px;
  }

  .ctx-panel.center .panel-header {
    display: none;
  }

  /* Panel items */
  .ctx-item {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: transparent;
    border: none;
    color: #5a5448;
    font-size: 15px;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    opacity: 0.45;
    position: relative;
    touch-action: manipulation;
  }

  .ctx-item:hover {
    background: rgba(255,255,255,0.04);
    opacity: 0.7;
  }

  .ctx-item.active {
    background: rgba(212,197,169,0.12);
    border: 1px solid rgba(212,197,169,0.2);
    color: #d4c5a9;
    opacity: 1;
  }

  .ctx-item .tooltip {
    display: none;
    position: absolute;
    left: calc(100% + 8px);
    top: 50%;
    transform: translateY(-50%);
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 10px;
    color: #b8a88a;
    white-space: nowrap;
    pointer-events: none;
  }

  .ctx-panel.right .ctx-item .tooltip {
    left: auto;
    right: calc(100% + 8px);
  }

  .ctx-item:hover .tooltip {
    display: block;
  }

  /* Active items are clickable */
  .ctx-item.clickable {
    cursor: pointer;
    opacity: 0.7;
  }

  .ctx-item.clickable:hover {
    opacity: 1;
  }

  /* Separator in panels */
  .ctx-sep {
    width: 24px;
    height: 1px;
    background: rgba(255,255,255,0.05);
    margin: 3px auto;
  }

  .ctx-panel.center .ctx-sep {
    width: 1px;
    height: 24px;
    margin: auto 3px;
  }

  /* ===== RESPONSIVE ===== */
  @media (min-width: 768px) {
    #scene-info h2 {
      font-size: 26px;
    }
    #controls-hint {
      font-size: 11px;
    }
  }

  @media (max-width: 480px) {
    .launcher-buttons {
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    .launcher-btn {
      min-width: 200px;
      padding: 16px 24px;
    }
    .launcher-logo {
      font-size: 22px;
      margin-bottom: 40px;
    }
    #header-controls {
      gap: 6px;
    }
    .nav-select {
      font-size: 11px;
      padding: 4px 8px;
      max-width: 120px;
    }
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════ -->
<!-- LAUNCHER (modo minimalista)             -->
<!-- ════════════════════════════════════════ -->
<div id="launcher">
  <div class="launcher-content">
    <div class="launcher-logo">◈ SysNerIA</div>
    <div class="launcher-buttons">
      <div class="launcher-btn-group">
        <button id="escenario-btn" class="launcher-btn">ESCENARIO</button>
        <div id="escenario-dropdown" class="launcher-dropdown">
          <button data-scene="taller">🛠️ Taller</button>
          <button data-scene="mesa">🎨 Estudio</button>

        </div>
      </div>
      <a href="visor-threejs.html" class="launcher-btn">PRUEBA MESA</a>

</div>

<!-- ════════════════════════════════════════ -->
<!-- VIEWER (model-viewer escenas)           -->
<!-- ════════════════════════════════════════ -->
<div id="viewer-section">

  <!-- HEADER -->
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <h1>◈ SysNerIA</h1>
      <button id="back-launcher">← Inicio</button>
    </div>
    <div id="header-controls">
      <select id="scene-select" class="nav-select">
        <option value="taller" selected>🛠️ Taller</option>
        <option value="mesa">🎨 Estudio</option>
        <option value="bosque">🌳 Bosque</option>
        <option value="playa">🏖️ Playa</option>
      </select>
      <select id="mesa-select" class="nav-select">
        <option value="roble">🪵 V1 · Roble</option>
        <option value="blanca_bosque">🌲 V2 · Bosque</option>
        <option value="blanca_estudio">🎨 V3 · Estudio</option>
      </select>

  </header>

  <!-- VIEWER -->
  <div id="viewer-container">
    <model-viewer
      id="viewer"
      src=""
      alt="Escena 3D"
      camera-controls
      auto-rotate

      shadow-intensity="0.8"

      skybox-image=""

    <!-- LOADING -->
    <div id="loading" class="">
      <div class="spinner"></div>

    <!-- CORS WARNING (visible solo si abierto como file://) -->

      <button class="ctx-item" title="Lápiz"><span>✏️</span><span class="tooltip">Lápiz</span></button>

    <!-- CENTER PANEL — VISTA -->

    <div class="ctx-panel right">

      <button class="ctx-item" title="Fondo / Entorno"><span>🖼️</span><span class="tooltip">Fondo</span></button>

      <button class="ctx-item" title="Info escena"><span>📋</span><span class="tooltip">Info</span></button>
      <button class="ctx-item" title="Capturar pantalla"><span>📷</span><span class="tooltip">Capturar</span></button>

<script type="module">
import '@google/model-viewer';

const viewer = document.getElementById('viewer');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const sceneTitle = document.getElementById('scene-title');
const sceneDesc = document.getElementById('scene-desc');
const arButton = document.getElementById('ar-button');
const corsWarning = document.getElementById('cors-warning');
const corsClose = document.getElementById('cors-close');
const rotateToggle = document.getElementById('rotate-toggle');

const launcher = document.getElementById('launcher');
const viewerSection = document.getElementById('viewer-section');
const escenarioBtn = document.getElementById('escenario-btn');
const escenarioDropdown = document.getElementById('escenario-dropdown');
const backLauncher = document.getElementById('back-launcher');

// --- DETECTAR file:// ---
if (window.location.protocol === 'file:') {
  corsWarning.style.display = 'flex';
  loadingText.textContent = 'MODO ARCHIVO LOCAL';
  setTimeout(() => {
    loading.classList.add('hidden');
  }, 2000);
}

// --- LAUNCHER: dropdown toggle ---
escenarioBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  escenarioDropdown.classList.toggle('open');
});

// Cerrar dropdown al hacer clic fuera
document.addEventListener('click', () => {
  escenarioDropdown.classList.remove('open');
});

escenarioDropdown.addEventListener('click', (e) => {
  e.stopPropagation();
});

// --- LAUNCHER: seleccionar escenario ---
escenarioDropdown.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => {
    const scene = btn.dataset.scene;
    escenarioDropdown.classList.remove('open');
    launchScene(scene);
  });
});

// --- LAUNCHER → VIEWER ---
function launchScene(sceneKey) {
  // Ocultar launcher, mostrar viewer
  launcher.classList.add('hidden');
  viewerSection.classList.add('active');

  // Configurar y cargar escena
  const scenes = {
    taller:  { model: 'assets/taller_carpintero.glb', title: 'Taller Carpintero', desc: 'Taller · ventana · herramientas',  skybox: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/brown_photostudio_02_2k.hdr',             maxRadius: '20m' },
    mesa:    { model: 'assets/mesa_carpintero.glb',    title: 'Estudio',           desc: 'Sala blanca · iluminación de estudio',skybox: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/monochrome_studio_03_2k.hdr',              maxRadius: '20m' },
    bosque:  { model: 'assets/bosque_cartoon.glb',     title: 'Bosque Cartoon',    desc: '4 robles · agave · suelo de hierba',  skybox: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/autumn_park_2k.hdr',                     maxRadius: '5m' },
    playa:   { model: 'assets/playa.glb',               title: 'Playa Palmeras',   desc: 'Palmeras · arena · océano · nubes',   skybox: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/bell_park_pier_2k.hdr',                     maxRadius: '20m' },
  };

  const s = scenes[sceneKey];
  if (!s) return;

  // Sincronizar el select del header
  document.getElementById('scene-select').value = sceneKey;

  sceneTitle.textContent = s.title;
  sceneDesc.textContent = s.desc;
  if (s.skybox) viewer.skyboxImage = s.skybox;
  viewer.maxCameraOrbit = `360deg 89deg ${s.maxRadius}`;
  loading.classList.remove('hidden');
  viewer.src = s.model;

  // Escuchar carga
  const onLoad = () => {
    setTimeout(() => loading.classList.add('hidden'), 300);
  };
  viewer.addEventListener('load', onLoad, { once: true });
  setTimeout(() => {
    loading.classList.add('hidden');
  }, 30000);
}

// --- VIEWER → LAUNCHER ---
function goToLauncher() {
  viewerSection.classList.remove('active');
  launcher.classList.remove('hidden');
  // Limpiar modelo para no mantenerlo en memoria
  viewer.src = '';
}

backLauncher.addEventListener('click', goToLauncher);

// --- AUTO-ROTATE TOGGLE ---
let isRotating = true;
rotateToggle.addEventListener('click', () => {
  isRotating = !isRotating;
  viewer.autoRotate = isRotating;
  rotateToggle.textContent = isRotating ? '⏸' : '▶';
  rotateToggle.classList.toggle('paused', !isRotating);
  rotateToggle.title = isRotating ? 'Parar rotación' : 'Reanudar rotación';
});

// --- CAMERA CONTROLS (Context Panels) ---

// View state
let viewState = 'orbit'; // 'orbit' | 'front'

// Human view: camera at eye level (~1.7m), looking at scene center
function setHumanView() {
  viewer.cameraOrbit = '0deg 78deg 5m';
  viewer.autoRotate = false;
  isRotating = false;
  rotateToggle.textContent = '▶';
  rotateToggle.classList.add('paused');
  rotateToggle.title = 'Reanudar rotación';
  viewState = 'front';
}

// View switch: toggle front/orbit
function toggleView() {
  if (viewState === 'orbit') {
    setHumanView();
  } else {
    // Back to orbit
    viewer.cameraOrbit = '45deg 70deg 8m';
    viewer.autoRotate = true;
    isRotating = true;
    rotateToggle.textContent = '⏸';
    rotateToggle.classList.remove('paused');
    rotateToggle.title = 'Parar rotación';
    viewState = 'orbit';
  }
}

// Click handlers on clickable items
document.querySelectorAll('.ctx-item.clickable').forEach(item => {
  item.addEventListener('click', () => {
    const action = item.dataset.action;
    if (action === 'human-view') setHumanView();
    else if (action === 'view-switch') toggleView();
  });
});

// --- CERRAR CORS WARNING ---
corsClose.addEventListener('click', () => {
  corsWarning.style.display = 'none';
});

// --- SOPORTE AR ---
if (viewer.canActivateAR) {
  arButton.style.display = 'flex';
  arButton.addEventListener('click', () => viewer.activateAR());
}

// --- SCENE SELECT DROPDOWN (dentro del viewer) ---
document.getElementById('scene-select').addEventListener('change', async (e) => {
  const val = e.target.value;

  // Scene configs
  const scenes = {
    taller:  { model: 'assets/taller_carpintero.glb', title: 'Taller Carpintero', desc: 'Taller · ventana · herramientas',  skybox: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/brown_photostudio_02_2k.hdr',             maxRadius: '20m' },
    mesa:    { model: 'assets/mesa_carpintero.glb',    title: 'Estudio',           desc: 'Sala blanca · iluminación de estudio',skybox: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/monochrome_studio_03_2k.hdr',              maxRadius: '20m' },
    bosque:  { model: 'assets/bosque_cartoon.glb',     title: 'Bosque Cartoon',    desc: '4 robles · agave · suelo de hierba',  skybox: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/autumn_park_2k.hdr',                     maxRadius: '5m' },
    playa:   { model: 'assets/playa.glb',               title: 'Playa Palmeras',   desc: 'Palmeras · arena · océano · nubes',   skybox: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/2k/bell_park_pier_2k.hdr',                     maxRadius: '20m' },
  };

  const s = scenes[val];
  if (!s) return;

  sceneTitle.textContent = s.title;
  sceneDesc.textContent = s.desc;
  if (s.skybox) viewer.skyboxImage = s.skybox;
  viewer.maxCameraOrbit = `360deg 89deg ${s.maxRadius}`;
  loading.classList.remove('hidden');
  viewer.src = s.model;
  await new Promise(resolve => {
    viewer.addEventListener('load', resolve, { once: true });
    setTimeout(resolve, 15000);
  });
  setTimeout(() => loading.classList.add('hidden'), 300);
});

// --- TABLE VARIANT SELECT ---
document.getElementById('mesa-select').addEventListener('change', async (e) => {
  const table = e.target.value;
  const sceneSelect = document.getElementById('scene-select');
  const scene = sceneSelect.value;

  // Only switch table if on a scene that supports variants
  const comboScenes = ['taller']; // scenes with table variants
  if (!comboScenes.includes(scene)) return;

  const model = `assets/combinaciones/${scene}_${table}.glb`;
  loading.classList.remove('hidden');
  viewer.src = model;
  await new Promise(resolve => {
    viewer.addEventListener('load', resolve, { once: true });
    setTimeout(resolve, 15000);
  });
  setTimeout(() => loading.classList.add('hidden'), 300);
});
